<div class="log-feed-container">
    @for (log of logs(); track log.id) {
    @let theme = getThemeClass(log.type);

    <div class="log-entry group" [class]="theme">
        <div class="log-scanner-line"></div>

        <div class="flex justify-between items-center mb-1">
            <div class="flex items-center gap-3">
                <span class="log-badge font-orbitron">
                    {{ getLabel(log.type) }}
                </span>
            </div>
            <span class="text-slate-600 text-[10px] font-mono">
                [{{ log.created_at | date:'HH:mm:ss' }}]
            </span>
        </div>

        <p class="log-text font-medium">
            {{ log.message }}
        </p>
    </div>
    } @empty {
    <div class="py-20 text-center border-2 border-dashed border-slate-800/50 rounded-2xl">
        <span class="font-orbitron text-[10px] tracking-[0.5em] text-slate-700 animate-pulse">
            Participe das missões para ver seus eventos aqui!
        </span>
    </div>
    }
</div>
