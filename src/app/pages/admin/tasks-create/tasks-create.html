<div class="p-6 lg:p-10 mt-10 min-h-screen bg-[#020617]">
    <header class="max-w-4xl mx-auto mb-10 flex border-b border-white/5 pb-8">
        <div class="flex-1">
            <div class="flex items-center gap-3 mb-3">
                <div class="w-1.5 h-6 bg-cyan-500 shadow-[0_0_10px_#06b6d4]"></div>
                <h1
                    class="text-2xl md:text-3xl font-orbitron font-black uppercase tracking-tighter text-white leading-none">
                    Criação de <span class="text-cyan-500">Missões</span>
                </h1>
            </div>
            <p class="text-[10px] text-slate-400 font-mono leading-tight uppercase tracking-wider pl-4">
                Elabore novas tarefas e distribua estrategicamente.
            </p>
        </div>
        <div class="flex items-end mb-1 mt-4 md:mt-0">
            <button type="button" (click)="resetDaily()"
                class="px-2 py-2 bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/30 rounded text-[10px] uppercase tracking-widest font-orbitron transition-all">
                Reset
            </button>
        </div>
    </header>

    <div class="max-w-4xl mx-auto bg-slate-900/40 border border-slate-800 rounded-xl p-8">
        <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">

            <!-- Title -->
            <div class="flex flex-col gap-2">
                <label class="text-[10px] font-mono text-cyan-400 uppercase tracking-widest">Título da Missão</label>
                <input formControlName="title" type="text"
                    class="bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 transition-colors"
                    placeholder="Ex: Escovar os dentes e tomar banho" />
            </div>

            <!-- Description -->
            <div class="flex flex-col gap-2">
                <label class="text-[10px] font-mono text-cyan-400 uppercase tracking-widest">Descrição detalhada</label>
                <textarea formControlName="description" rows="3"
                    class="bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 transition-colors"
                    placeholder="Higiene matinal para começar o dia..."></textarea>
            </div>

            <!-- Rewards Row -->
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-mono text-amber-500 uppercase tracking-widest">Recompensa
                        (XP)</label>
                    <input formControlName="xp" type="number"
                        class="bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-amber-500 transition-colors" />
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-mono text-cyan-400 uppercase tracking-widest">Recompensa
                        (BITS)</label>
                    <input formControlName="bits" type="number"
                        class="bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 transition-colors" />
                </div>
            </div>

            <!-- Recurrence -->
            <div
                class="flex items-center gap-3 mt-2 bg-black/30 p-3 border border-white/5 rounded-lg border-l-2 border-l-cyan-500/50">
                <input formControlName="is_recurring" type="checkbox" id="recurring"
                    class="w-4 h-4 rounded border-gray-600 bg-black/50 text-cyan-500 focus:ring-cyan-500 focus:ring-offset-gray-900 cursor-pointer" />
                <label for="recurring"
                    class="text-xs font-mono text-cyan-100 cursor-pointer select-none tracking-widest flex items-center gap-2">
                    <span class="material-icons opacity-70 text-cyan-400 text-[14px]">Add</span>
                    Atividade Recorrente
                </label>
            </div>

            <!-- Assignment Rule -->
            <div class="flex flex-col gap-4 mt-4 border-t border-white/10 pt-6">
              <app-player-picker
                [players]="players()"
                [selectedIds]="taskForm.get('target_user_ids')?.value"
                (selectionChange)="onSelectionChange($event)">
              </app-player-picker>
              @if (taskForm.get('target_user_ids')?.touched && taskForm.get('target_user_ids')?.errors?.['minArrayLength']) {
              <p class="text-rose-500 text-[10px] font-mono">Selecione pelo menos um jogador.</p>
              }
            </div>

            <!-- Submit -->
            <div class="flex justify-end mt-4">
                <button type="submit" [disabled]="isSubmitting() || taskForm.invalid"
                    class="px-8 py-3 bg-cyan-600 hover:bg-cyan-500 disabled:opacity-50 disabled:cursor-not-allowed text-white text-[11px] font-orbitron uppercase tracking-widest rounded-lg transition-colors border border-cyan-400 shadow-[0_0_15px_rgba(6,182,212,0.3)] hover:shadow-[0_0_25px_rgba(6,182,212,0.6)]">
                    {{ isSubmitting() ? 'ENVIANDO...' : 'CRIAR MISSÃO' }}
                </button>
            </div>
        </form>
    </div>
</div>
