<div class="p-6 max-w-5xl mx-auto pb-24">
    <header class="mb-10">
        <h1 class="text-3xl font-orbitron font-black text-white uppercase tracking-wider">
            Painel de <span class="text-violet-500">Eventos</span>
        </h1>
        <p class="text-slate-400 font-mono text-sm mt-2">Crie Quests e Badges para os usuários.</p>
    </header>

    @if (successMessage()) {
    <div class="mb-6 bg-green-500/10 border border-green-500/50 p-4 rounded text-green-400 font-mono text-sm">
        > {{ successMessage() }}
    </div>
    }

    @if (errorMessage()) {
    <div class="mb-6 bg-red-500/10 border border-red-500/50 p-4 rounded text-red-400 font-mono text-sm">
        > ERROR: {{ errorMessage() }}
    </div>
    }

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- FORMULÁRIO -->
        <div class="bg-black/40 border border-white/10 rounded overflow-hidden">
            <div class="bg-white/5 px-6 py-4 border-b border-white/10">
                <h2 class="font-orbitron text-violet-400 font-bold uppercase tracking-widest text-sm">Dados do Evento
                </h2>
            </div>

            <form (ngSubmit)="onSubmit()" class="p-6 space-y-6">
                <!-- QUEST INFO -->
                <div class="space-y-4">
                    <h3
                        class="text-xs font-mono text-slate-500 uppercase tracking-widest border-b border-white/10 pb-2">
                        I. A Missão (Quest)</h3>
                    <div>
                        <label class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">Título do
                            Evento</label>
                        <input type="text" [ngModel]="title()" (ngModelChange)="title.set($event)" name="title"
                            class="w-full bg-[#0a0e14] border border-white/10 rounded px-4 py-2.5 text-white font-mono text-sm focus:outline-none focus:border-violet-500 transition-colors"
                            placeholder="Ex: A Grande Faxina Primaveril" required>
                    </div>

                    <div>
                        <label class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">Descrição da
                            Quest</label>
                        <textarea [ngModel]="description()" (ngModelChange)="description.set($event)" name="desc"
                            rows="2"
                            class="w-full bg-[#0a0e14] border border-white/10 rounded px-4 py-2.5 text-slate-300 font-mono text-sm focus:outline-none focus:border-violet-500 transition-colors"
                            placeholder="Detalhes para concluírem..."></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">XP
                                Recompensa</label>
                            <input type="number" [ngModel]="xp()" (ngModelChange)="xp.set($event)" name="xp"
                                class="w-full bg-[#0a0e14] border border-white/10 rounded px-4 py-2.5 text-emerald-400 font-mono focus:outline-none focus:border-emerald-500 transition-colors">
                        </div>
                        <div>
                            <label class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">Bits
                                (Moedas)</label>
                            <input type="number" [ngModel]="bits()" (ngModelChange)="bits.set($event)" name="bits"
                                class="w-full bg-[#0a0e14] border border-white/10 rounded px-4 py-2.5 text-amber-400 font-mono focus:outline-none focus:border-amber-500 transition-colors">
                        </div>
                    </div>
                </div>

                <!-- BADGE INFO -->
                <div class="space-y-4 pt-4 mt-6 border-t border-white/5">
                    <h3
                        class="text-xs font-mono text-slate-500 uppercase tracking-widest border-b border-white/10 pb-2">
                        II. O Badge (Conquista)</h3>
                    <div>
                        <label class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">Nome do
                            Badge</label>
                        <input type="text" [ngModel]="badgeTitle()" (ngModelChange)="badgeTitle.set($event)"
                            name="badgeTitle"
                            class="w-full bg-[#0a0e14] border border-white/10 rounded px-4 py-2.5 text-white font-mono text-sm focus:outline-none focus:border-violet-500 transition-colors"
                            placeholder="Ex: Deus da Limpeza">
                    </div>

                    <div>
                        <label class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">Citação /
                            Descrição do Badge</label>
                        <input type="text" [ngModel]="badgeDescription()" (ngModelChange)="badgeDescription.set($event)"
                            name="badgeDesc"
                            class="w-full bg-[#0a0e14] border border-white/10 rounded px-4 py-2.5 text-slate-400 text-xs italic focus:outline-none focus:border-violet-500 transition-colors"
                            placeholder="Aqueles que limpam brilham.">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label
                                class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">Raridade</label>
                            <select [ngModel]="badgeRarity()" (ngModelChange)="badgeRarity.set($event)" name="rarity"
                                class="w-full bg-[#0a0e14] border border-white/10 rounded px-4 py-2.5 text-white font-mono text-sm focus:outline-none focus:border-violet-500 transition-colors">
                                <option value="comum">Comum</option>
                                <option value="raro">Raro</option>
                                <option value="lendario">Lendário</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">Ícone do Badge</label>
                            <input type="text" [ngModel]="badgeIcon()" (ngModelChange)="badgeIcon.set($event)"
                                name="badgeIcon"
                                class="w-full bg-[#0a0e14] border border-white/10 rounded px-4 py-2.5 text-white font-mono text-xs focus:outline-none focus:border-violet-500 transition-colors"
                                placeholder="assets/badges/algo_icon.png">
                        </div>
                        <div>
                            <label class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">Caminho da Imagem</label>
                            <input type="text" [ngModel]="badgeCardImage()" (ngModelChange)="badgeCardImage.set($event)"
                                name="badgeImg"
                                class="w-full bg-[#0a0e14] border border-white/10 rounded px-4 py-2.5 text-white font-mono text-xs focus:outline-none focus:border-violet-500 transition-colors"
                                placeholder="assets/badges/algo.png">
                        </div>
                    </div>
                </div>

                <!-- ALVOS -->
                <div class="pt-4 mt-6 border-t border-white/5">
                  <app-player-picker
                    [players]="players()"
                    [selectedIds]="targetUserIds()"
                    (selectionChange)="onSelectionChange($event)">
                  </app-player-picker>
                </div>

                <div class="pt-8">
                    <button type="submit" [disabled]="isSubmitting()"
                        class="w-full py-4 bg-violet-600 hover:bg-violet-500 text-white font-orbitron font-bold tracking-widest uppercase rounded shadow-[0_0_20px_rgba(139,92,246,0.3)] transition-all disabled:opacity-50">
                        {{ isSubmitting() ? 'LANÇANDO EVENTO...' : 'LANÇAR EVENTO GLOBAL' }}
                    </button>
                </div>
            </form>
        </div>

        <!-- PREVIEW DO BADGE -->
        <div>
          <app-admin-badge-preview
            [title]="badgeTitle()"
            [description]="badgeDescription()"
            [rarity]="badgeRarity()"
            [cardImage]="badgeCardImage()">
          </app-admin-badge-preview>
        </div>
    </div>
</div>
