<div class="space-y-8 p-6 lg:p-10 mt-10 min-h-screen bg-[#020617]">
    <div class="flex items-end justify-between border-b border-violet-500/10 pb-6">
        <div>
            <h1 class="font-orbitron text-2xl font-black tracking-tighter text-white uppercase">
                Monitor de <span class="text-violet-500">Sistema</span>
            </h1>
            <p class="text-[10px] font-mono text-slate-500 mt-1 uppercase tracking-widest">Observabilidade e Progresso
            </p>
        </div>
        <!-- <div class="text-right">
            <span
                class="text-[10px] font-mono text-emerald-500 bg-emerald-500/5 border border-emerald-500/20 px-2 py-1 rounded">
                ONLINE
            </span>
        </div> -->
    </div>

    @if (isLoading()) {
    <div class="py-20 text-center border border-dashed border-slate-800 rounded-xl">
        <p class="font-mono text-slate-600 text-sm italic">Buscando métricas...</p>
    </div>
    } @else {

    <!-- System Metrics Row -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <app-admin-stat-card label="Total Players" [value]="analytics()?.system_metrics?.total_players"></app-admin-stat-card>
        <app-admin-stat-card label="Missões Aprovadas" [value]="analytics()?.system_metrics?.total_approved" accentClass="bg-indigo-900/10 border border-indigo-500/20 text-indigo-400"></app-admin-stat-card>
        <app-admin-stat-card label="Missões Reprovadas" [value]="analytics()?.system_metrics?.total_rejected" accentClass="bg-rose-900/10 border border-rose-500/20 text-rose-500"></app-admin-stat-card>
        <app-admin-stat-card label="Ag. Análise" [value]="analytics()?.system_metrics?.pending_analysis" accentClass="bg-amber-900/10 border border-amber-500/20 text-amber-500" [pulse]="true"></app-admin-stat-card>
    </div>

    <!-- Players Metrics Grid -->
    <h2 class="font-orbitron tracking-widest uppercase text-xs text-white border-b border-white/5 pb-2 mt-8">Status dos Jogadores</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        @for (item of analytics()?.users_metrics; track item.user.id) {
        <app-admin-player-card [item]="item"></app-admin-player-card>
        }
    </div>
    }
</div>
