<div class="relative group overflow-hidden bg-[#0a0e14] border border-slate-800/50 rounded-xl p-6 transition-all hover:border-violet-500/30">
  <div class="absolute -right-10 -top-10 w-32 h-32 bg-violet-500/5 blur-3xl rounded-full group-hover:bg-violet-500/10"></div>
  <div class="flex items-start gap-5 relative z-10">
    <img [src]="item().user.avatar" class="w-16 h-16 rounded-lg border-2 border-slate-800 group-hover:border-violet-500/50 transition-colors">
    <div class="flex-1">
      <div class="flex justify-between items-start">
        <div>
          <h3 class="font-orbitron text-lg font-bold text-slate-200 leading-none">{{ item().user.name }}</h3>
          <p class="text-[10px] font-mono text-slate-500 uppercase mt-1 tracking-widest">Level {{ item().user.level }}</p>
        </div>
        <div class="text-right">
          <p class="text-xs font-mono text-cyan-400">{{ item().user.bits }} BITS</p>
        </div>
      </div>
      <div class="mt-4">
        <app-xp-bar [xp]="item().user.xp" [level]="item().user.level"></app-xp-bar>
      </div>
      <div class="flex gap-4 mt-3 pt-3 border-t border-white/5">
        <div class="flex flex-col">
          <span class="text-[8px] font-mono text-slate-600 uppercase">Completas</span>
          <span class="text-xs font-orbitron text-slate-300">{{ item().total_completed }}</span>
        </div>
        <div class="flex flex-col">
          <span class="text-[8px] font-mono text-slate-600 uppercase">Ativas (Pendentes)</span>
          <span class="text-xs font-orbitron text-slate-300">{{ item().active_quests }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
