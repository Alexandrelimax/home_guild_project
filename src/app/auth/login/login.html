<app-auth-card-layout>
  <div slot="header" class="bg-[#1e293b] p-8 flex flex-col items-center border-b border-slate-700">
    <div class="relative group">
      <div class="absolute inset-0 bg-cyan-500/20 blur-xl rounded-full scale-125 group-hover:bg-cyan-500/30 transition-all"></div>
      <img src="assets/icons/icon_game.svg" alt="Game Icon" class="relative w-24 h-24 object-contain drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]">
    </div>
    <h1 class="mt-6 text-3xl font-black tracking-tighter uppercase italic">Início de Sessão</h1>
    <p class="text-yellow-500 text-xs font-bold tracking-widest uppercase">Gamificando sua rotina</p>
  </div>

  <div class="space-y-4">
    <div class="relative">
      <input type="email" [ngModel]="email()" (ngModelChange)="email.set($event)"
        placeholder="Seu e-mail de acesso"
        class="w-full bg-slate-800 border border-slate-700 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all placeholder:text-slate-500" />
    </div>

    @if (errorMessage()) {
    <p class="text-red-400 text-xs mt-2 font-mono text-center animate-pulse">{{ errorMessage() }}</p>
    }

    <div class="relative">
      <input type="password" [ngModel]="password()" (ngModelChange)="password.set($event)"
        placeholder="Sua senha secreta"
        class="w-full bg-slate-800 border border-slate-700 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all placeholder:text-slate-500" />
      <div class="text-right mt-2">
        <a href="#" class="text-[10px] text-slate-500 hover:text-cyan-400 transition-colors">Esqueceu a senha?</a>
      </div>
    </div>
  </div>

  <button (click)="onSubmit()" [disabled]="isLoading()"
    class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 disabled:opacity-50 disabled:cursor-not-allowed rounded-xl font-bold uppercase tracking-widest shadow-lg shadow-cyan-900/20 transition-all active:scale-95">
    {{ isLoading() ? 'AUTENTICANDO...' : 'INICIAR SESSÃO' }}
  </button>

  <div class="relative py-2">
    <div class="absolute inset-0 flex items-center">
      <div class="w-full border-t border-slate-800"></div>
    </div>
    <div class="relative flex justify-center text-[10px] uppercase">
      <span class="bg-[#0f172a] px-3 text-slate-600 font-bold tracking-[0.2em]">Sincronizar</span>
    </div>
  </div>

  <div class="flex justify-center gap-6">
    <div class="w-12 h-12 flex items-center justify-center bg-slate-800/30 border border-slate-700 rounded-lg shadow-[0_0_10px_rgba(34,211,238,0.1)]">
      <span class="text-cyan-400 text-xl">⚔️</span>
    </div>
    <div class="w-12 h-12 flex items-center justify-center bg-slate-800/30 border border-slate-700 rounded-lg shadow-[0_0_10px_rgba(59,130,246,0.1)]">
      <span class="text-blue-400 text-xl">🕹️</span>
    </div>
    <div class="w-12 h-12 flex items-center justify-center bg-slate-800/30 border border-slate-700 rounded-lg shadow-[0_0_10px_rgba(168,85,247,0.1)]">
      <span class="text-purple-400 text-xl">💎</span>
    </div>
  </div>

  <p class="text-center text-xs text-slate-500 mt-4">
    Novo por aqui? <a routerLink="/register" class="text-orange-400 font-bold hover:underline cursor-pointer">Criar Conta</a>
  </p>
</app-auth-card-layout>
