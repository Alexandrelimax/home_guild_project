<div class="flex justify-between text-[9px] font-mono text-slate-500 mb-1 uppercase tracking-tighter">
  <span>XP Progress</span>
  <span>{{ xp() }} / {{ xpPerLevel }}</span>
</div>
<div class="h-1.5 w-full bg-slate-900 rounded-full overflow-hidden border border-white/5">
  <div class="h-full bg-gradient-to-r transition-all duration-1000"
    [class]="accentClass()"
    [style.width.%]="percentage()"></div>
</div>
